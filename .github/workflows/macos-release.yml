name: macOS signed release artifact

on:
  workflow_dispatch:
    inputs:
      expected_commit:
        description: Full 40-character commit SHA selected for this release attempt
        required: true
        type: string
      expected_ref:
        description: Exact protected ref, for example refs/heads/main or refs/tags/v0.1.0
        required: true
        type: string
      expected_version:
        description: Exact project version, for example 0.1.0
        required: true
        type: string
      artifact_format:
        description: Notarized artifact format to prepare (nothing is published)
        required: true
        default: zip
        type: choice
        options:
          - zip
          - dmg
          - both

permissions:
  contents: read

concurrency:
  group: macos-release-${{ inputs.expected_commit }}
  cancel-in-progress: false

jobs:
  sign-and-notarize:
    # Repository settings must configure this environment with required reviewers,
    # prevent self-review, disable admin bypass, and restrict it to protected refs.
    # Personal 1.0 has only one approver, so leave this Environment disabled and
    # secret-free until a second independent reviewer is added.
    environment: macos-release
    runs-on: macos-15
    timeout-minutes: 150
    defaults:
      run:
        shell: bash

    steps:
      - name: Check out protected source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          ref: ${{ inputs.expected_commit }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          architecture: arm64
          cache: pip

      - name: Bind protected source, commit, ref, and version
        env:
          REF_PROTECTED: ${{ github.ref_protected }}
          EVENT_SHA: ${{ github.sha }}
          EVENT_REF: ${{ github.ref }}
          EXPECTED_COMMIT: ${{ inputs.expected_commit }}
          EXPECTED_REF: ${{ inputs.expected_ref }}
          EXPECTED_VERSION: ${{ inputs.expected_version }}
          MACOS_TEAM_MODE_ENABLED: ${{ vars.MACOS_TEAM_MODE_ENABLED }}
          APPLE_DEVELOPER_IDENTITY: ${{ vars.APPLE_DEVELOPER_IDENTITY }}
          APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
          APPLE_NOTARY_KEY_ID: ${{ vars.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ vars.APPLE_NOTARY_ISSUER_ID }}
        run: |
          set -euo pipefail
          test "$MACOS_TEAM_MODE_ENABLED" = "true" || {
            echo 'Team-mode macOS signing is disabled; use the source-bound local workflow.' >&2
            exit 65
          }
          test "$REF_PROTECTED" = "true" || {
            echo 'The macOS release workflow only runs from a protected branch or tag.' >&2
            exit 65
          }
          test "$(uname -m)" = "arm64"
          [[ "$EXPECTED_COMMIT" =~ ^[0-9A-Fa-f]{40}$ ]] || {
            echo 'expected_commit must be a full 40-character hexadecimal SHA.' >&2
            exit 64
          }
          [[ "$EXPECTED_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]] || {
            echo 'expected_version is not a safe semantic version.' >&2
            exit 64
          }
          case "$EXPECTED_REF" in
            refs/heads/* | refs/tags/*) ;;
            *) echo 'expected_ref must be a full branch or tag ref.' >&2; exit 64 ;;
          esac

          expected_commit="$(printf '%s' "$EXPECTED_COMMIT" | tr '[:upper:]' '[:lower:]')"
          checked_out_commit="$(git rev-parse HEAD)"
          test "$checked_out_commit" = "$expected_commit"
          test "$EVENT_SHA" = "$expected_commit"
          test "$EVENT_REF" = "$EXPECTED_REF"
          declared_version="$(python -c \
            'import pathlib,tomllib; print(tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"])')"
          test "$declared_version" = "$EXPECTED_VERSION"
          git diff --quiet
          git diff --cached --quiet

          test -n "$APPLE_DEVELOPER_IDENTITY"
          test -n "$APPLE_TEAM_ID"
          test -n "$APPLE_NOTARY_KEY_ID"
          test -n "$APPLE_NOTARY_ISSUER_ID"
          case "$APPLE_DEVELOPER_IDENTITY" in
            'Developer ID Application: '*) ;;
            *) echo 'APPLE_DEVELOPER_IDENTITY is not a Developer ID Application identity.' >&2; exit 65 ;;
          esac

          {
            echo "SKILLHUB_SOURCE_SHA=$checked_out_commit"
            echo "SKILLHUB_SOURCE_REF=$EXPECTED_REF"
            echo "SKILLHUB_EXPECTED_VERSION=$EXPECTED_VERSION"
            echo "SKILLHUB_PROVENANCE_FILE=artifacts/skillctl-$EXPECTED_VERSION-macos13-arm64.provenance.json"
          } >> "$GITHUB_ENV"

      # No Apple secret is injected while constrained repository dependencies are installed.
      # Build isolation is disabled only after the exact Hatchling toolchain is installed.
      # This ordering reduces exposure but is not a process-isolation boundary: all reviewed
      # build code remains capable of running later in this same protected job.
      - name: Install constrained build dependencies
        env:
          PIP_DISABLE_PIP_VERSION_CHECK: "1"
          PIP_NO_INPUT: "1"
        run: |
          python -m pip install --only-binary=:all: --constraint constraints.txt \
            build hatchling pyinstaller
          python -m pip install --no-build-isolation --constraint constraints.txt '.[dev]'
          python -m pip check
          test "$(python -c 'from skillhub import __version__; print(__version__)')" = \
            "$SKILLHUB_EXPECTED_VERSION"

      - name: Create source-bound provenance record
        env:
          ARTIFACT_FORMAT: ${{ inputs.artifact_format }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          python - <<'PY'
          import datetime
          import hashlib
          import json
          import os
          from pathlib import Path

          target = Path(os.environ["SKILLHUB_PROVENANCE_FILE"])
          value = {
              "schema": "skillhub.macos-release-provenance/v1",
              "status": "prepared",
              "created_at": datetime.datetime.now(datetime.timezone.utc).isoformat(),
              "source_commit": os.environ["SKILLHUB_SOURCE_SHA"],
              "source_ref": os.environ["SKILLHUB_SOURCE_REF"],
              "version": os.environ["SKILLHUB_EXPECTED_VERSION"],
              "requested_format": os.environ["ARTIFACT_FORMAT"],
              "repository": os.environ["GITHUB_REPOSITORY"],
              "workflow_run_id": os.environ["GITHUB_RUN_ID"],
              "workflow_run_attempt": os.environ["GITHUB_RUN_ATTEMPT"],
              "runner_arch": os.uname().machine,
              "runner_image_os": os.environ.get("ImageOS"),
              "runner_image_version": os.environ.get("ImageVersion"),
              "constraints_sha256": hashlib.sha256(Path("constraints.txt").read_bytes()).hexdigest(),
              "artifacts": [],
              "notary_submissions": [],
              "submitted_inputs": [],
          }
          temporary = target.with_name(f".{target.name}.partial")
          temporary.write_text(json.dumps(value, indent=2, sort_keys=True) + "\n")
          temporary.replace(target)
          PY

      - name: Import signing and notarization credentials
        env:
          DEVELOPER_ID_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_P12_BASE64 }}
          DEVELOPER_ID_P12_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_P12_PASSWORD }}
          NOTARY_API_KEY_P8_BASE64: ${{ secrets.APPLE_NOTARY_API_KEY_P8_BASE64 }}
          APPLE_DEVELOPER_IDENTITY: ${{ vars.APPLE_DEVELOPER_IDENTITY }}
        run: |
          set -euo pipefail
          test -n "$DEVELOPER_ID_P12_BASE64"
          test -n "$DEVELOPER_ID_P12_PASSWORD"
          test -n "$NOTARY_API_KEY_P8_BASE64"

          certificate_path="$RUNNER_TEMP/developer-id.p12"
          notary_key_path="$RUNNER_TEMP/notary-api-key.p8"
          keychain_path="$RUNNER_TEMP/skillhub-signing.keychain-db"
          keychain_password="$(openssl rand -hex 32)"

          printf '%s' "$DEVELOPER_ID_P12_BASE64" | base64 --decode > "$certificate_path"
          printf '%s' "$NOTARY_API_KEY_P8_BASE64" | base64 --decode > "$notary_key_path"
          chmod 600 "$certificate_path" "$notary_key_path"

          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 7200 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" \
            -P "$DEVELOPER_ID_P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -f pkcs12 \
            -k "$keychain_path"
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -k "$keychain_password" \
            "$keychain_path"
          security list-keychains -d user -s "$keychain_path"
          security find-identity -v -p codesigning "$keychain_path" \
            | grep -F "$APPLE_DEVELOPER_IDENTITY" >/dev/null

          {
            echo "SKILLHUB_SIGNING_KEYCHAIN=$keychain_path"
            echo "SKILLHUB_CERTIFICATE_PATH=$certificate_path"
            echo "SKILLHUB_NOTARY_KEY=$notary_key_path"
          } >> "$GITHUB_ENV"

      - name: Build, sign, notarize, and verify
        id: release
        env:
          SKILLHUB_CODESIGN_IDENTITY: ${{ vars.APPLE_DEVELOPER_IDENTITY }}
          SKILLHUB_EXPECTED_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
          SKILLHUB_EXPECTED_COMMIT: ${{ inputs.expected_commit }}
          SKILLHUB_EXPECTED_REF: ${{ inputs.expected_ref }}
          SKILLHUB_EXPECTED_VERSION: ${{ inputs.expected_version }}
          SKILLHUB_NOTARY_KEY_ID: ${{ vars.APPLE_NOTARY_KEY_ID }}
          SKILLHUB_NOTARY_ISSUER: ${{ vars.APPLE_NOTARY_ISSUER_ID }}
          SKILLHUB_RELEASE_FORMAT: ${{ inputs.artifact_format }}
        run: ./ops/macos/release_cli.sh

      - name: Finalize release provenance
        if: always()
        env:
          RELEASE_OUTCOME: ${{ steps.release.outcome }}
        run: |
          set -euo pipefail
          test -f "${SKILLHUB_PROVENANCE_FILE:-}" || exit 0
          python - <<'PY'
          import datetime
          import hashlib
          import json
          import os
          from pathlib import Path

          target = Path(os.environ["SKILLHUB_PROVENANCE_FILE"])
          value = json.loads(target.read_text())
          artifact_dir = target.parent
          stem = f"skillctl-{value['version']}-macos13-arm64"

          artifacts = []
          for suffix in ("zip", "dmg"):
              path = artifact_dir / f"{stem}.{suffix}"
              if path.is_file():
                  artifacts.append({
                      "name": path.name,
                      "sha256": hashlib.sha256(path.read_bytes()).hexdigest(),
                      "size": path.stat().st_size,
                  })

          submissions = []
          for path in sorted(artifact_dir.glob(f"{stem}.notary-*.json")):
              if path.name.endswith("-log.json"):
                  continue
              try:
                  result = json.loads(path.read_text())
                  submissions.append({
                      "evidence": path.name,
                      "id": result.get("id"),
                      "status": result.get("status"),
                      "sha256": hashlib.sha256(path.read_bytes()).hexdigest(),
                  })
              except (OSError, ValueError) as error:
                  submissions.append({"evidence": path.name, "parse_error": str(error)})

          inputs = []
          for path in sorted(artifact_dir.glob(f"{stem}-signed-unnotarized.*.sha256")):
              fields = path.read_text().split()
              inputs.append({
                  "checksum_file": path.name,
                  "sha256": fields[0] if fields else None,
              })

          value.update({
              "status": os.environ.get("RELEASE_OUTCOME") or "not-run",
              "completed_at": datetime.datetime.now(datetime.timezone.utc).isoformat(),
              "artifacts": artifacts,
              "notary_submissions": submissions,
              "submitted_inputs": inputs,
          })
          temporary = target.with_name(f".{target.name}.partial")
          temporary.write_text(json.dumps(value, indent=2, sort_keys=True) + "\n")
          temporary.replace(target)
          if value["status"] == "success" and not artifacts:
              raise SystemExit("release reported success without a suffix-free artifact")
          PY

      - name: Remove temporary signing material
        id: cleanup
        if: always()
        run: |
          set +e
          cleanup_rc=0
          keychain_path="${SKILLHUB_SIGNING_KEYCHAIN:-$RUNNER_TEMP/skillhub-signing.keychain-db}"
          if [ -e "$keychain_path" ]; then
            security delete-keychain "$keychain_path" || cleanup_rc=1
          fi
          rm -f \
            "${SKILLHUB_CERTIFICATE_PATH:-$RUNNER_TEMP/developer-id.p12}" \
            "${SKILLHUB_NOTARY_KEY:-$RUNNER_TEMP/notary-api-key.p8}" || cleanup_rc=1
          test ! -e "$keychain_path" || cleanup_rc=1
          test ! -e "${SKILLHUB_CERTIFICATE_PATH:-$RUNNER_TEMP/developer-id.p12}" || cleanup_rc=1
          test ! -e "${SKILLHUB_NOTARY_KEY:-$RUNNER_TEMP/notary-api-key.p8}" || cleanup_rc=1
          exit "$cleanup_rc"

      - name: Upload verified artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: skillctl-macos-${{ inputs.expected_version }}-${{ inputs.expected_commit }}
          path: |
            artifacts/skillctl-*-macos13-arm64.zip
            artifacts/skillctl-*-macos13-arm64.zip.sha256
            artifacts/skillctl-*-macos13-arm64.dmg
            artifacts/skillctl-*-macos13-arm64.dmg.sha256
            artifacts/skillctl-*.provenance.json
            !artifacts/*-adhoc*
            !artifacts/*-signed-unnotarized*
          if-no-files-found: error
          compression-level: 0
          retention-days: 7

      - name: Upload notarization evidence even on rejection
        # Keep rejection evidence, but never invoke another action on a runner
        # where signing material could not be removed.
        if: ${{ always() && steps.cleanup.outcome == 'success' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: skillctl-macos-evidence-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            artifacts/skillctl-*.provenance.json
            artifacts/skillctl-*.notary-*.json
            artifacts/*-signed-unnotarized.zip.sha256
            artifacts/*-signed-unnotarized.dmg.sha256
          if-no-files-found: warn
          compression-level: 0
          retention-days: 30
