name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: python -m pip install --constraint constraints.txt -e '.[dev]'
      - name: Lint
        run: ruff check src tests migrations
      - name: Test
        run: pytest
      - name: Verify OpenAPI snapshot
        run: |
          python ops/scripts/export_openapi.py
          git diff --exit-code -- docs/api/openapi.json
      - name: Verify Alembic model parity
        env:
          SKILLHUB_ENV: test
          SKILLHUB_DATABASE_URL: sqlite:////tmp/skillhub-ci.db
        run: |
          alembic upgrade head
          alembic check
      - name: Build packages
        run: python -m build
